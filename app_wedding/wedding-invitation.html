<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>South Asian Wedding Invitation</title>
  <link rel="stylesheet" href="assets/css/invitation-card.css" />
</head>
<body>
  <article class="invitation-sheet" role="img" aria-label="Elegant wedding invitation card">
    <section class="invitation-card">
      <div class="monogram">
        <span class="initials">A &amp; Z</span>
      </div>
      <div class="headline">
        <p class="bismillah">In the name of Allah, the Most Gracious, the Most Merciful</p>
      </div>
      <div class="invitation-copy">
        <p>With the blessings of our families,</p>
        <p class="couple"><span class="script">[Groom Name]</span> &amp; <span class="script">[Bride Name]</span></p>
        <p>request the honor of your presence<br />at their wedding ceremony</p>
      </div>
      <div class="event-details">
        <p>on <strong>[Date]</strong> at <strong>[Time]</strong></p>
        <p>at <strong>[Venue Name, City]</strong></p>
      </div>
      <div class="reception-note">
        <p>Dinner &amp; reception to follow.</p>
      </div>
    </section>
  </article>
</body>
</html>
